name: Update case results

on:
    schedule:
        - cron: '0 8 * * *'
    workflow_dispatch:

jobs:
    update-case-results:
        runs-on: ubuntu-latest

        env:
            TESTRAY_CLIENT_ID: ${{ secrets.TESTRAY_CLIENT_ID }}
            TESTRAY_CLIENT_SECRET: ${{ secrets.TESTRAY_CLIENT_SECRET }}

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run update-case-results script
              run: npx tsx src/scripts/update-case-results.ts
